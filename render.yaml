services:
  - type: web
    name: pulso-api
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @pulso/db generate && pnpm --filter @pulso/api build
    # preDeployCommand corre con DATABASE_URL/DIRECT_URL ya inyectadas, ANTES del cutover de tráfico.
    # Si falla, Render mantiene la versión anterior (deploy seguro).
    preDeployCommand: pnpm --filter @pulso/db migrate:deploy && pnpm --filter @pulso/db triggers
    startCommand: pnpm --filter @pulso/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AUDIT_HASH_SALT
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: 'Pulso <no-reply@pulso.health>'
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: 'https://pulso.health,https://admin.pulso.health'
      - key: NEXT_PUBLIC_SITE_URL
        value: 'https://pulso.health'

  - type: cron
    name: pulso-audit-verify
    runtime: node
    region: oregon
    plan: starter
    branch: main
    schedule: '0 4 * * *'
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @pulso/db generate
    startCommand: pnpm --filter @pulso/db run-once verify-chain
    envVars:
      - key: DATABASE_URL
        sync: false
