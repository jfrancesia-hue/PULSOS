services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pulso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: pulso
      POSTGRES_DB: pulso
    ports:
      - '5432:5432'
    volumes:
      - pulso-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulso -d pulso']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pulso-pg-data:
