services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pulso-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: pulso
      POSTGRES_DB: pulso
    ports:
      - '5432:5432'
    volumes:
      - pulso-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulso -d pulso']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pulso-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pulso
      MINIO_ROOT_PASSWORD: pulso-minio-dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - pulso-minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pulso-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    logging:
      driver: 'none'

volumes:
  pulso-pg-data:
  pulso-minio-data:
