name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build · Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pulso/db generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || true

      - name: Tests (audit + auth)
        run: |
          pnpm --filter @pulso/audit test
          pnpm --filter @pulso/auth test

      - name: Build api
        run: pnpm --filter @pulso/api build

      - name: Build web
        run: pnpm --filter @pulso/web build
        env:
          NEXT_PUBLIC_API_URL: https://pulso.health/api
          NEXT_PUBLIC_SITE_URL: https://pulso.health

      - name: Build admin
        run: pnpm --filter @pulso/admin build
        env:
          NEXT_PUBLIC_API_URL: https://pulso.health/api

  gitleaks:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
